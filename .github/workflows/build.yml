name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dns-manager/package-lock.json

      - name: Install dependencies
        working-directory: dns-manager
        run: npm ci

      - name: TypeScript build
        working-directory: dns-manager
        run: npm run build

      - name: Typecheck
        working-directory: dns-manager
        # Runs after "TypeScript build" because tsc needs next-env.d.ts, which
        # `next build` generates (it is gitignored and absent on a fresh checkout).
        run: npm run typecheck

      - name: Lint
        working-directory: dns-manager
        run: npm run lint

      - name: Install Playwright browsers
        working-directory: dns-manager
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        working-directory: dns-manager
        run: npm run test:e2e

  mcp-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Build (tsc — fails on type errors)
        working-directory: mcp-server
        run: npm run build
