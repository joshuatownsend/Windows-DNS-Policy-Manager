version: 2
updates:
  - package-ecosystem: npm
    directory: /dns-manager
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      next-ecosystem:
        patterns:
          - "next"
          - "eslint-config-next"
      tailwind-ecosystem:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tw-animate-css"
          - "tailwind-merge"
      shadcn-ui:
        patterns:
          - "@base-ui/react"
          - "shadcn"
          - "class-variance-authority"
          - "clsx"
          - "lucide-react"
      types-and-tooling:
        patterns:
          - "@types/*"
          - "typescript"
          - "eslint"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /mcp-server
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      mcp-server-deps:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
